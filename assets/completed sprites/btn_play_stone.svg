  <rect x="134" y="32" width="8" height="8" fill="#e8d5ff"/>
  <rect x="144" y="32" width="8" height="8" fill="#e8d5ff"/>
  <rect x="124" y="42" width="8" height="8" fill="#e8d5ff"/>
  <rect x="144" y="42" width="8" height="8" fill="#e8d5ff"/>
  <rect x="124" y="52" width="8" height="8" fill="#e8d5ff"/>
  <rect x="144" y="52" width="8" height="8" fill="#e8d5ff"/>
