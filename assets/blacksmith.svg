<svg width="80" height="100" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Anvil -->
  <path d="M 40 90 L 40 70 L 35 70 L 35 60 L 75 60 L 75 70 L 70 70 L 70 90 Z" fill="#444"/>
  <path d="M 30 55 L 80 55 L 75 60 L 35 60 Z" fill="#666"/>
  
  <!-- Blacksmith body -->
  <rect x="10" y="40" width="30" height="40" fill="#8B4513" rx="5"/>
  <rect x="5" y="40" width="10" height="30" fill="#D2691E" rx="3"/> <!-- arm -->
  
  <!-- Hammer -->
  <rect x="0" y="55" width="20" height="5" fill="#555"/>
  <rect x="-5" y="50" width="10" height="15" fill="#888" rx="2"/>
  
  <!-- Head & Beard -->
  <circle cx="25" cy="25" r="15" fill="#FFCDB2"/>
  <path d="M 10 30 Q 25 55 40 30 Z" fill="#808080"/> <!-- huge grey beard -->
  
  <!-- Eyes -->
  <circle cx="30" cy="20" r="2" fill="#000"/>
  
  <!-- Legs -->
  <rect x="15" y="80" width="8" height="20" fill="#333"/>
  <rect x="27" y="80" width="8" height="20" fill="#333"/>
</svg>
